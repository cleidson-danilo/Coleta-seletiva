<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoPonto Digital - Recife</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-slate-50 font-['Poppins']">

    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <i class="fas fa-recycle text-emerald-600 text-2xl"></i>
                <span class="text-xl font-bold text-slate-800">EcoPonto <span class="text-emerald-600">Digital</span></span>
            </div>
            <div class="space-x-6 flex items-center">
                <a href="/pontos" class="text-slate-600 hover:text-emerald-600 transition">Pontos de Coleta</a>
                <a href="/guia" class="text-slate-600 hover:text-emerald-600 transition">Guia</a>
                <a href="/login" class="bg-emerald-600 text-white px-5 py-2 rounded-lg hover:bg-emerald-700 transition">Entrar</a>
            </div>
        </div>
    </nav>

    <header class="container mx-auto px-6 py-20 text-center">
        <h1 class="text-5xl md:text-6xl font-extrabold text-slate-900 mb-6">
            Transforme o futuro de <br>
            <span class="text-emerald-600">Recife com um clique.</span>
        </h1>
        <p class="text-xl text-slate-600 mb-10 max-w-2xl mx-auto">
            Conectamos você aos pontos de coleta seletiva e cooperativas locais para um descarte consciente e sustentável.
        </p>
        <div class="flex justify-center gap-4">
            <a href="/cadastro-agendamento" class="bg-emerald-600 text-white px-8 py-4 rounded-xl font-bold shadow-lg hover:scale-105 transition">Solicitar Coleta</a>
            <a href="/pontos" class="bg-white text-emerald-600 border-2 border-emerald-600 px-8 py-4 rounded-xl font-bold hover:bg-emerald-50 transition">Ver Mapa Real</a>
        </div>
    </header>
</body>
</html>
